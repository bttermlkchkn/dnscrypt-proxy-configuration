# --- [4] STRICT REQUIREMENTS ---
require_dnssec = true
require_nolog = true
require_nofilter = false   # Allow Quad9 filtering for protection
# (Set to `true` if you *never* want filtering — but then remove Quad9)

# --- [5] BOOTSTRAP & FALLBACK RESILIENCE ---
# Multiple diverse, reliable bootstrap DNS — IPv6 preferred
bootstrap_resolvers = [
  # IPv6 (preferred)
  '[2620:fe::fe]:53',          # Quad9 IPv6
  '[2001:620:0:ff::2]:53',     # SWITCH CH IPv6
  '[2a05:fc84::42]:53',        # Digital Society Zürich IPv6

  # IPv4 (fallback)
  '9.9.9.9:53',                # Quad9 IPv4
  '130.59.31.248:53',          # SWITCH CH IPv4
  '185.95.218.42:53',          # Digital Society Zürich IPv4
]

ignore_system_dns = true
netprobe_address = '9.9.9.9:53'  # IPv4 net health check
netprobe_timeout = 10

# --- [6] CACHING ---
cache = true
cache_size = 8192
cache_min_ttl = 60   # 1 min
cache_max_ttl = 86400 # 24h

