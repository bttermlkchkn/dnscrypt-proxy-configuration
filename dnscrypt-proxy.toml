# ------------------------------

# --- [1] LOCAL LISTENING ---
# Listen on standard DNS port (53) for seamless NetworkManager integration
listen_addresses = ['127.0.0.1:53', '[::1]:53']
max_clients = 250

# --- [2] PROTOCOL PREFERENCE ---
ipv4_servers = true   # Keep as fallback
ipv6_servers = true   # Primary path
dnscrypt_servers = true
doh_servers = false
odoh_servers = false

# --- [3] SERVER SELECTION — Strict Geo-Fencing (FR, DE, CH, NL, DK) ---
# Verified against live public-resolvers.md
